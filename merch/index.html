<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Merch · Viajero Hostels</title>
  <link rel="icon" href="../favicon-32x32.png" type="image/png"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --coral:#F04B24; --coral-dark:#d03d1a; --coral-soft:#FEF0EC;
      --purple:#5b21b6; --purple-dark:#4c1d95; --purple-soft:#ede9fe;
      --dark:#1E100A; --mid:#6B3A28; --cream:#F4EFE9;
      --gris:#7A6E68; --border:#DDD4CA;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Outfit',sans-serif;background:#f8f5f2;color:var(--dark);min-height:100vh;}

    header{background:var(--dark);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.35);}
    .header-left{display:flex;align-items:center;gap:16px;}
    .btn-hub{display:flex;align-items:center;gap:6px;color:#fff;text-decoration:none;font-size:13px;font-weight:500;opacity:.7;transition:opacity .2s;}
    .btn-hub:hover{opacity:1;}
    .btn-hub svg{width:16px;height:16px;}
    .divider-v{width:1px;height:24px;background:rgba(255,255,255,.2);}
    header img{height:36px;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .badge-module{background:var(--purple);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;}
    .last-update{color:rgba(255,255,255,.5);font-size:12px;}

    .filtros{background:var(--purple);padding:10px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:64px;z-index:99;}
    .filtros label{color:rgba(255,255,255,.85);font-size:13px;font-weight:500;}
    .filtros select{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;outline:none;}
    .filtros select:hover{background:rgba(255,255,255,.25);}
    .filtros select option{background:var(--purple-dark);color:#fff;}

    main{padding:28px 32px;max-width:1440px;margin:0 auto;}
    .section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--gris);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px;}
    .kpi-card{background:#fff;border-radius:14px;padding:20px 22px;border:1px solid var(--border);position:relative;overflow:hidden;transition:box-shadow .2s;}
    .kpi-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--purple);}
    .kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--gris);margin-bottom:8px;}
    .kpi-value{font-size:26px;font-weight:700;color:var(--dark);line-height:1;}
    .kpi-sub{font-size:12px;color:var(--gris);margin-top:6px;}
    .kpi-icon{position:absolute;right:18px;top:18px;font-size:22px;opacity:.15;}

    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px;}
    @media(max-width:900px){.two-col{grid-template-columns:1fr;}}
    .card{background:#fff;border-radius:14px;padding:22px;border:1px solid var(--border);}
    .card-title{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .bar-label{font-size:13px;color:var(--dark);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .bar-track{flex:1;background:var(--cream);border-radius:6px;height:10px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:6px;background:var(--purple);transition:width .5s ease;}
    .bar-fill.coral{background:var(--coral);}
    .bar-val{font-size:13px;font-weight:600;color:var(--dark);width:54px;text-align:right;}

    .city-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:32px;}
    .city-card{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid var(--border);transition:box-shadow .2s;}
    .city-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
    .city-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
    .city-name{font-size:14px;font-weight:600;color:var(--dark);}
    .city-key{font-size:11px;font-weight:700;background:var(--purple-soft);color:var(--purple-dark);padding:2px 8px;border-radius:20px;}
    .city-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
    .city-stat-val{font-size:18px;font-weight:700;color:var(--dark);text-align:center;}
    .city-stat-lbl{font-size:10px;color:var(--gris);text-transform:uppercase;letter-spacing:.4px;text-align:center;}
    .st-bar-track{background:var(--cream);border-radius:6px;height:6px;overflow:hidden;margin-top:4px;}
    .st-bar-fill{height:100%;border-radius:6px;background:var(--purple);}
    .st-label{font-size:11px;color:var(--gris);margin-top:4px;}

    .heatmap-wrap{overflow-x:auto;margin-bottom:32px;}
    .heatmap-table{width:100%;border-collapse:collapse;font-size:13px;}
    .heatmap-table th{padding:8px 12px;text-align:center;font-weight:600;color:var(--gris);font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border);}
    .heatmap-table th.left{text-align:left;}
    .heatmap-table td{padding:8px 12px;text-align:center;border-bottom:1px solid var(--border);}
    .heatmap-table td.left{text-align:left;font-weight:500;}
    .heat-cell{display:inline-flex;align-items:center;justify-content:center;width:40px;height:26px;border-radius:6px;font-weight:600;font-size:13px;}
    .heat-0{background:#f1f5f9;color:#94a3b8;}
    .heat-low{background:#fef9c3;color:#713f12;}
    .heat-mid{background:#bbf7d0;color:#14532d;}
    .heat-high{background:#6ee7b7;color:#064e3b;}
    .heat-alert{background:#fee2e2;color:#991b1b;}

    .pvp-table{width:100%;border-collapse:collapse;font-size:13px;}
    .pvp-table th{padding:8px 14px;text-align:left;font-weight:600;color:var(--gris);font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border);}
    .pvp-table td{padding:10px 14px;border-bottom:1px solid var(--border);}
    .pvp-table tr:last-child td{border-bottom:none;}
    .pvp-table tr:hover td{background:var(--cream);}
    .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
    .pill-high{background:#d1fae5;color:#065f46;}
    .pill-mid{background:#fef9c3;color:#78350f;}
    .pill-low{background:#fee2e2;color:#991b1b;}
    .pvp-bar{display:flex;align-items:center;gap:8px;}
    .pvp-mini-track{width:80px;background:var(--cream);border-radius:4px;height:6px;overflow:hidden;}
    .pvp-mini-fill{height:100%;border-radius:4px;background:var(--purple);}

    .hallazgos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:32px;}
    .hallazgo-card{border-radius:12px;padding:16px 18px;border:1px solid transparent;display:flex;gap:12px;align-items:flex-start;}
    .hallazgo-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
    .hallazgo-text{font-size:13px;line-height:1.55;color:var(--dark);}
    .hallazgo-text strong{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
    .h-alert{background:#fff7ed;border-color:#fed7aa;}
    .h-alert strong{color:#c2410c;}
    .h-ok{background:#f0fdf4;border-color:#bbf7d0;}
    .h-ok strong{color:#15803d;}
    .h-info{background:var(--purple-soft);border-color:#c4b5fd;}
    .h-info strong{color:var(--purple-dark);}
    .h-warn{background:#fefce8;border-color:#fde68a;}
    .h-warn strong{color:#92400e;}

    .acordeon{margin-bottom:32px;}
    .acordeon-item{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
    .acordeon-header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s;}
    .acordeon-header:hover{background:var(--cream);}
    .acordeon-left{display:flex;align-items:center;gap:10px;}
    .acordeon-key{font-size:11px;font-weight:700;background:var(--purple-soft);color:var(--purple-dark);padding:2px 8px;border-radius:20px;}
    .acordeon-nombre{font-size:14px;font-weight:600;color:var(--dark);}
    .acordeon-stats{display:flex;gap:20px;align-items:center;}
    .ac-val{font-size:15px;font-weight:700;color:var(--dark);}
    .ac-lbl{font-size:10px;color:var(--gris);}
    .acordeon-arrow{font-size:18px;color:var(--gris);transition:transform .2s;}
    .acordeon-item.open .acordeon-arrow{transform:rotate(180deg);}
    .acordeon-body{display:none;padding:0 20px 18px;}
    .acordeon-item.open .acordeon-body{display:block;}
    .prod-row{display:grid;grid-template-columns:1fr 58px 58px 58px 58px 90px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
    .prod-row:last-child{border-bottom:none;}
    .prod-row.header div{font-size:10px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.4px;}
    .prod-cell{text-align:center;font-size:13px;font-weight:600;}
    .cell-alert{color:#dc2626;}
    .cell-ok{color:#059669;}
    .talla-chips{display:flex;gap:3px;justify-content:center;}
    .talla-chip{font-size:10px;padding:1px 5px;border-radius:4px;background:var(--cream);color:var(--mid);font-weight:600;}

    .consolidado-table{width:100%;border-collapse:collapse;font-size:13px;}
    .consolidado-table th{padding:10px 14px;background:var(--dark);color:#fff;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
    .consolidado-table th:first-child{border-radius:8px 0 0 0;}
    .consolidado-table th:last-child{border-radius:0 8px 0 0;}
    .consolidado-table td{padding:10px 14px;border-bottom:1px solid var(--border);}
    .consolidado-table tr:last-child td{border-bottom:none;font-weight:700;background:var(--cream);}
    .consolidado-table tr:hover:not(:last-child) td{background:var(--cream);}
    .st-chip{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600;}
    .st-high{background:#d1fae5;color:#065f46;}
    .st-mid{background:#fef9c3;color:#78350f;}
    .st-low{background:#fee2e2;color:#991b1b;}

    footer{text-align:center;padding:24px;color:var(--gris);font-size:12px;border-top:1px solid var(--border);margin-top:8px;}
    .empty{text-align:center;padding:60px;color:var(--gris);font-size:14px;}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="../index.html" class="btn-hub">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      Hub
    </a>
    <div class="divider-v"></div>
    <img src="../02_Logo-Viajero_Vertical-Blanco.png" alt="Viajero Hostels"/>
  </div>
  <div class="header-right">
    <span class="badge-module">🛍 Merch</span>
    <span class="last-update" id="lastUpdate">Cargando…</span>
  </div>
</header>

<div class="filtros">
  <label>Punto de venta:</label>
  <select id="filtroHostal" onchange="aplicarFiltro()">
    <option value="todos">Todos los hostales</option>
    <option value="BOG">Bogotá</option>
    <option value="TAY">Tayrona</option>
    <option value="MED">Medellín</option>
    <option value="GTP">Guatapé</option>
    <option value="GTS">Getsemaní</option>
    <option value="CLO">Cali</option>
  </select>
</div>

<main>
  <div class="section-title">Indicadores clave</div>
  <div class="kpi-grid" id="kpiGrid"></div>

  <div class="two-col">
    <div class="card"><div class="card-title"><span>🏙</span> Ventas por ciudad</div><div id="barCiudad"></div></div>
    <div class="card"><div class="card-title"><span>👕</span> Ventas por producto</div><div id="barProducto"></div></div>
  </div>

  <div class="section-title">Detalle por punto de venta</div>
  <div class="city-grid" id="cityGrid"></div>

  <div class="section-title">Inventario por ciudad · unidades vendidas</div>
  <div class="card heatmap-wrap" style="margin-bottom:32px;"><div id="heatmapContainer"></div></div>

  <div class="section-title">Precio vs rotación</div>
  <div class="card" style="margin-bottom:32px;overflow-x:auto;"><table class="pvp-table" id="pvpTable"></table></div>

  <div class="section-title">Hallazgos clave</div>
  <div class="hallazgos-grid" id="hallazgosGrid"></div>

  <div class="section-title">Inventario detallado por hostal</div>
  <div class="acordeon" id="acordeonContainer"></div>

  <div class="section-title">Resumen consolidado sell-through</div>
  <div class="card" style="overflow-x:auto;margin-bottom:32px;"><table class="consolidado-table" id="consolidadoTable"></table></div>
</main>

<footer id="footer">Viajero Hostels · Dashboard Merch</footer>

<script>
const DATA_URL = '../data/merch_data.json';
const H_ORDER  = ['BOG','TAY','MED','GTP','GTS','CLO'];
const H_SHORT  = {BOG:'Bogotá',TAY:'Tayrona',MED:'Medellín',GTP:'Guatapé',GTS:'Getsemaní',CLO:'Cali'};
let DATA = null, FILTRO = 'todos';

async function cargarDatos() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    DATA = await r.json();
    renderTodo();
  } catch(e) {
    document.querySelector('main').innerHTML = '<div class="empty">⚠️ No se pudo cargar <code>data/merch_data.json</code>.<br>Súbelo al repositorio primero.</div>';
  }
}

function aplicarFiltro() { FILTRO = document.getElementById('filtroHostal').value; renderTodo(); }
function fmt(n)  { return Number(n||0).toLocaleString('es-CO'); }
function stCls(v){ return v>=30?'st-high':v>=15?'st-mid':'st-low'; }
function pillCls(v){return v>=30?'pill-high':v>=15?'pill-mid':'pill-low';}

function getKpis() {
  if (FILTRO==='todos') return DATA.kpis;
  const h = FILTRO;
  let env=0,ven=0,ing=0;
  DATA.productos.forEach(p=>{
    const ph=p.porHostal.find(x=>x.key===h)||{};
    env+=ph.enviado||0; ven+=ph.vendido||0; ing+=(ph.vendido||0)*p.pvp;
  });
  const estrella = DATA.productos.reduce((a,b)=>{
    const av=(a.porHostal.find(x=>x.key===h)||{}).vendido||0;
    const bv=(b.porHostal.find(x=>x.key===h)||{}).vendido||0;
    return bv>av?b:a;
  }, DATA.productos[0]);
  const lider = DATA.resumenHostal.find(r=>r.key===h)||{};
  return {
    totalUnidades:ven, totalIngresos:ing, totalEnviado:env, totalStock:env-ven,
    sellThrGlobal: env>0?Math.round((ven/env)*100):0,
    ciudadLider:lider.nombre||'—', ciudadLiderKey:h, ciudadLiderUds:ven,
    productoEstrella: estrella?estrella.producto:'—',
    productoEstrellaSellThr: estrella?(estrella.porHostal.find(x=>x.key===h)||{}).sellThr||0:0,
    productoEstrellaUds: estrella?(estrella.porHostal.find(x=>x.key===h)||{}).vendido||0:0,
  };
}

function renderTodo() {
  renderKpis(); renderBarras(); renderCityCards(); renderHeatmap();
  renderPvpTable(); renderHallazgos(); renderAcordeon(); renderConsolidado();
  const d = new Date(DATA.actualizado);
  document.getElementById('lastUpdate').textContent =
    d.toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'})+' · '+
    d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('footer').textContent =
    'Viajero Hostels · Dashboard Merch · Actualizado '+
    d.toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'});
}

function renderKpis() {
  const k = getKpis();
  const cards = [
    {label:'Unidades vendidas', value:fmt(k.totalUnidades), sub:`de ${fmt(k.totalEnviado)} enviadas`, icon:'📦'},
    {label:'Ingresos estimados', value:'$'+fmt(k.totalIngresos), sub:`sell-through ${k.sellThrGlobal}%`, icon:'💰'},
    {label:'Ciudad líder', value:H_SHORT[k.ciudadLiderKey]||k.ciudadLider, sub:`${fmt(k.ciudadLiderUds)} uds vendidas`, icon:'🏆'},
    {label:'Producto estrella', value:k.productoEstrella, sub:`${k.productoEstrellaUds} uds · ${k.productoEstrellaSellThr}% ST`, icon:'⭐'},
    {label:'Stock disponible', value:fmt(k.totalStock), sub:'unidades en inventario', icon:'🗃'},
  ];
  document.getElementById('kpiGrid').innerHTML = cards.map(c=>`
    <div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
      <div class="kpi-icon">${c.icon}</div>
    </div>`).join('');
}

function renderBarras() {
  let cd = FILTRO==='todos'
    ? DATA.resumenHostal.map(r=>({label:H_SHORT[r.key]||r.key, val:r.vendido}))
    : [{label:H_SHORT[FILTRO], val:DATA.resumenHostal.find(r=>r.key===FILTRO)?.vendido||0}];
  const mc = Math.max(...cd.map(x=>x.val),1);
  document.getElementById('barCiudad').innerHTML = [...cd].sort((a,b)=>b.val-a.val).map(r=>`
    <div class="bar-row">
      <div class="bar-label">${r.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.val/mc*100)}%"></div></div>
      <div class="bar-val">${r.val} uds</div>
    </div>`).join('');

  let pd = DATA.productos.map(p=>({
    label:p.producto,
    val: FILTRO==='todos'?p.totalVendido:(p.porHostal.find(x=>x.key===FILTRO)||{}).vendido||0
  }));
  const mp = Math.max(...pd.map(x=>x.val),1);
  document.getElementById('barProducto').innerHTML = [...pd].sort((a,b)=>b.val-a.val).map(r=>`
    <div class="bar-row">
      <div class="bar-label">${r.label}</div>
      <div class="bar-track"><div class="bar-fill coral" style="width:${Math.round(r.val/mp*100)}%"></div></div>
      <div class="bar-val">${r.val} uds</div>
    </div>`).join('');
}

function renderCityCards() {
  const list = FILTRO==='todos' ? DATA.resumenHostal : DATA.resumenHostal.filter(r=>r.key===FILTRO);
  document.getElementById('cityGrid').innerHTML = list.map(h=>`
    <div class="city-card">
      <div class="city-header">
        <div class="city-name">${H_SHORT[h.key]||h.key}</div>
        <div class="city-key">${h.key}</div>
      </div>
      <div class="city-stats">
        <div><div class="city-stat-val">${h.vendido}</div><div class="city-stat-lbl">Vendido</div></div>
        <div><div class="city-stat-val">${h.enviado}</div><div class="city-stat-lbl">Enviado</div></div>
        <div><div class="city-stat-val">${h.stock}</div><div class="city-stat-lbl">Stock</div></div>
      </div>
      <div class="st-bar-track"><div class="st-bar-fill" style="width:${h.sellThr}%"></div></div>
      <div class="st-label">Sell-through: <strong>${h.sellThr}%</strong> · $${fmt(h.ingresos)}</div>
    </div>`).join('');
}

function renderHeatmap() {
  const hs = FILTRO==='todos' ? H_ORDER : [FILTRO];
  const heatCls = (v,e) => {
    if (!e) return 'heat-0';
    if (v>e) return 'heat-alert';
    const r=v/e;
    return r>=.5?'heat-high':r>=.25?'heat-mid':'heat-low';
  };
  const header = `<tr><th class="left">Producto</th>${hs.map(h=>`<th>${H_SHORT[h]||h}</th>`).join('')}<th>Total</th></tr>`;
  const rows = DATA.productos.map(p=>{
    const cells = hs.map(h=>{
      const ph=p.porHostal.find(x=>x.key===h)||{enviado:0,vendido:0};
      return `<td><div class="heat-cell ${heatCls(ph.vendido,ph.enviado)}">${ph.vendido}</div></td>`;
    });
    const tot = FILTRO==='todos'?p.totalVendido:(p.porHostal.find(x=>x.key===FILTRO)||{}).vendido||0;
    return `<tr><td class="left">${p.producto}</td>${cells.join('')}<td><strong>${tot}</strong></td></tr>`;
  }).join('');
  const leg = `<tr><td colspan="${hs.length+2}" style="padding:10px 12px;font-size:11px;color:var(--gris);">
    <span style="margin-right:12px;"><span class="heat-cell heat-0" style="width:18px;height:16px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;">0</span> Sin ventas</span>
    <span style="margin-right:12px;"><span class="heat-cell heat-low" style="width:18px;height:16px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;">↓</span> &lt;25%</span>
    <span style="margin-right:12px;"><span class="heat-cell heat-mid" style="width:18px;height:16px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;">◐</span> 25–50%</span>
    <span style="margin-right:12px;"><span class="heat-cell heat-high" style="width:18px;height:16px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;">↑</span> +50%</span>
    <span><span class="heat-cell heat-alert" style="width:18px;height:16px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;">!</span> Vendido &gt; Enviado</span>
  </td></tr>`;
  document.getElementById('heatmapContainer').innerHTML =
    `<table class="heatmap-table">${header}${rows}${leg}</table>`;
}

function renderPvpTable() {
  const rows = DATA.productos.map(p=>{
    const v=FILTRO==='todos'?p.totalVendido:(p.porHostal.find(x=>x.key===FILTRO)||{}).vendido||0;
    const e=FILTRO==='todos'?p.totalEnviado:(p.porHostal.find(x=>x.key===FILTRO)||{}).enviado||0;
    const st=e>0?Math.round((v/e)*100):0;
    return {nombre:p.producto, pvp:p.pvp, v, e, st};
  }).sort((a,b)=>b.st-a.st);
  const maxP = Math.max(...rows.map(r=>r.pvp),1);
  document.getElementById('pvpTable').innerHTML = `
    <thead><tr><th>Producto</th><th>PVP</th><th>Vendido</th><th>Enviado</th><th>Sell-through</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.nombre}</td>
      <td><div class="pvp-bar"><div class="pvp-mini-track"><div class="pvp-mini-fill" style="width:${Math.round(r.pvp/maxP*100)}%"></div></div><span>$${fmt(r.pvp)}</span></div></td>
      <td>${r.v}</td><td>${r.e}</td>
      <td><span class="pill ${pillCls(r.st)}">${r.st}%</span></td>
    </tr>`).join('')}</tbody>`;
}

function renderHallazgos() {
  const k = getKpis();
  const alertas = DATA.stockCritico.filter(s=>s.tipo==='alerta'&&(FILTRO==='todos'||s.key===FILTRO));
  const lideres = [...DATA.resumenHostal].sort((a,b)=>b.vendido-a.vendido);
  const estrella = DATA.productos.reduce((a,b)=>b.totalVendido>a.totalVendido?b:a, DATA.productos[0]);
  const bajoST = DATA.resumenHostal.filter(r=>r.sellThr<15);
  const masStock = [...DATA.productos].sort((a,b)=>b.totalStock-a.totalStock)[0];

  const H = [];
  H.push({tipo:'ok',icon:'🏆',titulo:'Ciudad líder',texto:`<strong>${H_SHORT[lideres[0].key]}</strong> lidera con ${lideres[0].vendido} uds y ${lideres[0].sellThr}% sell-through.`});
  H.push({tipo:'ok',icon:'⭐',titulo:'Producto estrella',texto:`<strong>${estrella.producto}</strong> es el más vendido: ${estrella.totalVendido} uds, ${estrella.sellThrTotal}% rotación global.`});
  if (alertas.length>0) H.push({tipo:'alert',icon:'⚠️',titulo:'Alerta de inventario',texto:`${alertas.length} caso(s) con vendido &gt; enviado: ${alertas.map(a=>`${a.producto} en ${H_SHORT[a.key]||a.hostal}`).join(', ')}. Verificar conteo físico.`});
  H.push({tipo:k.sellThrGlobal>=20?'ok':'warn',icon:k.sellThrGlobal>=20?'📈':'📉',titulo:'Sell-through global',texto:`ST global: <strong>${k.sellThrGlobal}%</strong>. ${k.sellThrGlobal>=20?'Ritmo saludable de rotación.':'Por debajo del 20% — revisar visibilidad y estrategia de precio.'}`});
  if (bajoST.length>0&&FILTRO==='todos') H.push({tipo:'warn',icon:'🔻',titulo:'Rotación baja',texto:`${bajoST.map(r=>H_SHORT[r.key]).join(', ')} con ST &lt;15%. Considerar activaciones o descuentos focalizados.`});
  if (masStock&&masStock.totalStock>5) H.push({tipo:'info',icon:'💡',titulo:'Oportunidad',texto:`<strong>${masStock.producto}</strong> tiene el mayor stock sin rotar (${masStock.totalStock} uds). Priorizar visibilidad en punto de venta.`});

  const cls = {ok:'h-ok',alert:'h-alert',warn:'h-warn',info:'h-info'};
  document.getElementById('hallazgosGrid').innerHTML = H.map(h=>`
    <div class="hallazgo-card ${cls[h.tipo]}">
      <div class="hallazgo-icon">${h.icon}</div>
      <div class="hallazgo-text"><strong>${h.titulo}</strong>${h.texto}</div>
    </div>`).join('');
}

function renderAcordeon() {
  const list = FILTRO==='todos'?DATA.resumenHostal:DATA.resumenHostal.filter(r=>r.key===FILTRO);
  document.getElementById('acordeonContainer').innerHTML = list.map(h=>`
    <div class="acordeon-item" id="ac-${h.key}">
      <div class="acordeon-header" onclick="toggleAc('${h.key}')">
        <div class="acordeon-left">
          <div class="acordeon-key">${h.key}</div>
          <div class="acordeon-nombre">${H_SHORT[h.key]||h.key}</div>
        </div>
        <div class="acordeon-stats">
          <div class="ac-stat"><div class="ac-val">${h.vendido}</div><div class="ac-lbl">vendido</div></div>
          <div class="ac-stat"><div class="ac-val">${h.enviado}</div><div class="ac-lbl">enviado</div></div>
          <div class="ac-stat"><div class="ac-val">${h.sellThr}%</div><div class="ac-lbl">sell-th.</div></div>
          <div class="acordeon-arrow">▾</div>
        </div>
      </div>
      <div class="acordeon-body">
        <div class="prod-row header">
          <div>Producto</div><div style="text-align:center">Enviado</div>
          <div style="text-align:center">Vendido</div><div style="text-align:center">Stock</div>
          <div style="text-align:center">ST%</div><div style="text-align:center">Tallas (inv.)</div>
        </div>
        ${DATA.productos.map(p=>{
          const ph=p.porHostal.find(x=>x.key===h.key)||{enviado:0,vendido:0,stock:0,sellThr:0,alerta:false,tallas:{S:0,M:0,L:0}};
          return `<div class="prod-row">
            <div style="font-size:13px">${p.producto}</div>
            <div class="prod-cell">${ph.enviado}</div>
            <div class="prod-cell ${ph.alerta?'cell-alert':''}">${ph.vendido}${ph.alerta?' ⚠️':''}</div>
            <div class="prod-cell">${ph.stock}</div>
            <div class="prod-cell"><span class="pill ${pillCls(ph.sellThr)}">${ph.sellThr}%</span></div>
            <div class="prod-cell"><div class="talla-chips">
              <span class="talla-chip">S:${ph.tallas?.S||0}</span>
              <span class="talla-chip">M:${ph.tallas?.M||0}</span>
              <span class="talla-chip">L:${ph.tallas?.L||0}</span>
            </div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function toggleAc(key) { document.getElementById('ac-'+key).classList.toggle('open'); }

function renderConsolidado() {
  const rows = DATA.productos.map(p=>{
    const v=FILTRO==='todos'?p.totalVendido:(p.porHostal.find(x=>x.key===FILTRO)||{}).vendido||0;
    const e=FILTRO==='todos'?p.totalEnviado:(p.porHostal.find(x=>x.key===FILTRO)||{}).enviado||0;
    const st=e>0?Math.round((v/e)*100):0;
    return {nombre:p.producto, pvp:p.pvp, e, v, s:Math.max(0,e-v), st, ing:v*p.pvp};
  });
  const te=rows.reduce((a,b)=>a+b.e,0), tv=rows.reduce((a,b)=>a+b.v,0),
        ts=rows.reduce((a,b)=>a+b.s,0), ti=rows.reduce((a,b)=>a+b.ing,0),
        tst=te>0?Math.round((tv/te)*100):0;
  document.getElementById('consolidadoTable').innerHTML = `
    <thead><tr><th>Producto</th><th>PVP</th><th>Enviado</th><th>Vendido</th><th>Stock</th><th>Sell-through</th><th>Ingresos est.</th></tr></thead>
    <tbody>
    ${rows.map(r=>`<tr>
      <td>${r.nombre}</td><td>$${fmt(r.pvp)}</td><td>${r.e}</td><td>${r.v}</td><td>${r.s}</td>
      <td><span class="st-chip ${stCls(r.st)}">${r.st}%</span></td><td>$${fmt(r.ing)}</td>
    </tr>`).join('')}
    <tr><td>TOTAL</td><td>—</td><td>${te}</td><td>${tv}</td><td>${ts}</td>
      <td><span class="st-chip ${stCls(tst)}">${tst}%</span></td><td>$${fmt(ti)}</td></tr>
    </tbody>`;
}

cargarDatos();
</script>
</body>
</html>
